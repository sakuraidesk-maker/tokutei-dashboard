<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定技能支援事業 ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f7f4;
  --surface:#ffffff;
  --surface2:#f2f1ee;
  --border:#e8e6e1;
  --border2:#d4d1ca;
  --text:#1c1917;
  --text2:#6b6760;
  --text3:#a8a5a0;
  --accent:#2563eb;
  --accent2:#1d4ed8;
  --accent-bg:#eff6ff;
  --accent-border:#bfdbfe;
  --green:#16a34a;
  --green-bg:#f0fdf4;
  --amber:#d97706;
  --amber-bg:#fffbeb;
  --red:#dc2626;
  --red-bg:#fef2f2;
  --purple:#7c3aed;
  --purple-bg:#f5f3ff;
  --teal:#0d9488;
  --teal-bg:#f0fdfa;
  --r-sm:6px;
  --r-md:10px;
  --r-lg:16px;
  --r-xl:20px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 20px 48px rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:100vh}

/* ===== SIDEBAR ===== */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sb-logo{
  padding:1.5rem 1.25rem 1rem;
  border-bottom:1px solid var(--border);
}
.sb-logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:8px;
  background:var(--accent);color:#fff;
  font-size:13px;font-weight:600;margin-bottom:.625rem;
  letter-spacing:-.5px;
}
.sb-logo-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.sb-logo-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sb-section{padding:.875rem 0}
.sb-section+.sb-section{border-top:1px solid var(--border)}
.sb-section-title{
  font-size:10px;font-weight:600;letter-spacing:.1em;
  color:var(--text3);text-transform:uppercase;
  padding:0 1.25rem;margin-bottom:.375rem;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 1.25rem;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:400;
  border-left:2px solid transparent;
  transition:all .15s;border-radius:0;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{
  background:var(--accent-bg);color:var(--accent);
  border-left-color:var(--accent);font-weight:500;
}
.nav-icon{
  width:16px;height:16px;flex-shrink:0;opacity:.6;
}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;font-size:10px;font-weight:600;
  padding:1px 6px;border-radius:20px;
  background:var(--red-bg);color:var(--red);
}
.nav-badge.zero{background:var(--surface2);color:var(--text3)}

.sb-stats{padding:1rem 1.25rem}
.sb-stat-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.sb-stat-val{font-size:22px;font-weight:300;color:var(--text);letter-spacing:-.5px;font-family:'DM Serif Display',serif}
.sb-prog{background:var(--border);border-radius:3px;height:3px;margin-top:6px;overflow:hidden}
.sb-prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}

/* ===== MAIN ===== */
.main{flex:1;min-width:0;padding:2rem 2.5rem}

/* ===== PAGE HEADER ===== */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;gap:1rem;flex-wrap:wrap}
.page-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--text);font-weight:400;letter-spacing:-.3px;line-height:1.2}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.hdr-actions{display:flex;gap:8px;align-items:center;padding-top:4px}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;font-size:13px;font-weight:500;
  border:1px solid var(--border2);border-radius:var(--r-md);
  background:var(--surface);color:var(--text);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn.danger{color:var(--red);border-color:#fecaca}
.btn.danger:hover{background:var(--red-bg)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--surface2);color:var(--text)}
.btn.sm{padding:5px 12px;font-size:12px;border-radius:var(--r-sm)}

/* ===== STATS GRID ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:1.25rem;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .2s;
}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-eyebrow{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:.5rem}
.stat-number{font-family:'DM Serif Display',serif;font-size:36px;font-weight:400;line-height:1;letter-spacing:-1px}
.stat-sub{font-size:12px;color:var(--text2);margin-top:6px}
.stat-prog{background:var(--border);border-radius:2px;height:2px;margin-top:10px;overflow:hidden}
.stat-prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ===== CARDS ===== */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:1.5rem;
  box-shadow:var(--shadow-sm);margin-bottom:1.25rem;
}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* ===== GRID ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}

/* ===== BADGES ===== */
.badge{
  display:inline-flex;align-items:center;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;white-space:nowrap;
}
.s-done{background:var(--green-bg);color:var(--green)}
.s-wip{background:var(--accent-bg);color:var(--accent)}
.s-todo{background:var(--surface2);color:var(--text2)}
.s-hold{background:var(--amber-bg);color:var(--amber)}
.s-urgent{background:var(--red-bg);color:var(--red)}
.s-pending{background:var(--purple-bg);color:var(--purple)}

/* ===== TABLE ===== */
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text3);text-align:left;padding:8px 12px;
  background:var(--surface2);border-bottom:1px solid var(--border);
}
.tbl th:first-child{border-radius:var(--r-sm) 0 0 0}
.tbl th:last-child{border-radius:0 var(--r-sm) 0 0}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl.hoverable tr:hover td{background:var(--surface2);cursor:pointer}

/* ===== PROGRESS ===== */
.prog{background:var(--border);border-radius:2px;height:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ===== PHASE ROW ===== */
.phase-row{
  display:flex;align-items:center;gap:10px;
  padding:.625rem 0;cursor:pointer;
}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-name{font-size:13px;font-weight:400;flex:0 0 140px}
.phase-bar-wrap{flex:1;max-width:160px}
.phase-count{font-size:11px;color:var(--text3);min-width:40px;text-align:right}

/* ===== ALERT BOX ===== */
.alert{
  border-radius:var(--r-md);padding:1rem 1.25rem;
  margin-bottom:1.25rem;font-size:13px;line-height:1.7;
}
.alert-info{background:var(--accent-bg);border:1px solid var(--accent-border);color:#1e40af}
.alert-title{font-weight:600;font-size:12px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;opacity:.7}

/* ===== REVENUE TABLE ===== */
.rev-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rev-tbl th{background:var(--text);color:#fff;padding:8px 12px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.rev-tbl th:first-child{text-align:left;border-radius:var(--r-sm) 0 0 0}
.rev-tbl th:last-child{border-radius:0 var(--r-sm) 0 0}
.rev-tbl td{padding:9px 12px;border-bottom:1px solid var(--border);text-align:right}
.rev-tbl td:first-child{text-align:left;color:var(--text2)}
.rev-tbl .subtotal td{background:var(--surface2);font-weight:600}
.rev-tbl .total td{background:var(--accent);color:#fff;font-weight:600}
.rev-tbl .total td:first-child{border-radius:0 0 0 var(--r-sm)}
.rev-tbl .total td:last-child{border-radius:0 0 var(--r-sm) 0}

/* ===== UPDATE ITEM ===== */
.upd-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:1.25rem;margin-bottom:.875rem;
  box-shadow:var(--shadow-sm);
}
.upd-meta{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.upd-tag{
  font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;
  background:var(--accent-bg);color:var(--accent);margin-right:6px;letter-spacing:.03em;
}
.upd-text{font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap}

/* ===== WEEKLY / APPROVAL CARDS ===== */
.change-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:1.25rem;margin-bottom:.875rem;
  box-shadow:var(--shadow-sm);transition:box-shadow .15s;
}
.change-card:hover{box-shadow:var(--shadow-md)}
.approval-card{
  background:var(--surface);border:2px solid #fecaca;
  border-radius:var(--r-lg);padding:1.25rem;margin-bottom:.875rem;
  box-shadow:var(--shadow-sm);
}
.approval-card.resolved{border:1px solid var(--border);opacity:.75}

/* ===== GANTT ===== */
.gantt-cell{
  display:inline-block;width:100%;
  background:var(--accent-bg);border:1px solid var(--accent-border);
  border-radius:var(--r-sm);padding:3px 8px;
  font-size:11px;font-weight:500;color:var(--accent);text-align:center;
}
.gantt-cell.done{background:var(--green-bg);border-color:#bbf7d0;color:var(--green)}

/* ===== MODAL ===== */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.35);backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);border-radius:var(--r-xl);
  padding:2rem;width:580px;max-width:95vw;max-height:90vh;
  overflow-y:auto;box-shadow:var(--shadow-lg);
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:1.5rem;letter-spacing:-.3px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;
  border:1px solid var(--border2);border-radius:var(--r-md);
  font-size:13px;font-family:'DM Sans',sans-serif;
  color:var(--text);background:var(--surface);
  transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* ===== EMPTY STATE ===== */
.empty{
  text-align:center;padding:3.5rem 2rem;
  color:var(--text3);font-size:13px;
}
.empty-icon{font-size:28px;margin-bottom:.75rem;opacity:.4}

/* ===== DIVIDER ===== */
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0}

/* ===== INFO GRID ===== */
.info-row{display:flex;gap:1rem;padding:.625rem 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-key{font-size:12px;color:var(--text3);min-width:100px;flex-shrink:0;padding-top:1px}
.info-val{font-size:13px;color:var(--text);line-height:1.6;flex:1}

/* ===== MISSION BOX ===== */
.mission-box{
  background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);
  border-radius:var(--r-lg);padding:1.5rem;color:#fff;margin-bottom:1.25rem;
  position:relative;overflow:hidden;
}
.mission-box::after{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.mission-box::before{
  content:'';position:absolute;bottom:-20px;left:20px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.mission-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:.5rem}
.mission-text{font-size:14px;line-height:1.75;opacity:.92;position:relative;z-index:1}

/* ===== TARGET CARDS ===== */
.target-card{
  background:var(--surface2);border-radius:var(--r-md);
  padding:1rem;text-align:center;
}
.target-num{font-family:'DM Serif Display',serif;font-size:36px;letter-spacing:-1px;line-height:1;margin-bottom:4px}
.target-label{font-size:11px;color:var(--text3);font-weight:500}
.target-note{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5}

/* ===== SUPPORT ITEMS ===== */
.support-item{
  background:var(--surface2);border-radius:var(--r-md);
  padding:.75rem 1rem;
}
.support-num{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.05em;margin-bottom:2px}
.support-name{font-size:13px;font-weight:500;color:var(--text)}
.support-timing{font-size:11px;color:var(--text3);margin-top:2px}

/* ===== TASK NAME ===== */
.task-name-cell{font-weight:500;color:var(--text);margin-bottom:2px}
.task-name-cell.done{text-decoration:line-through;color:var(--text3)}
.task-detail-cell{font-size:11px;color:var(--text3);line-height:1.5}

@media(max-width:800px){
  .sidebar{display:none}
  .main{padding:1.25rem}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-mark">TS</div>
    <div class="sb-logo-name">特定技能支援事業</div>
    <div class="sb-logo-sub" id="sb-date"></div>
  </div>

  <div class="sb-section">
    <div class="sb-section-title">ページ</div>
    <div class="nav-item active" id="nav-overview" onclick="show('overview')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      事業概要
    </div>
    <div class="nav-item" id="nav-tasks" onclick="show('tasks')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h8M2 12h10"/></svg>
      タスク管理
    </div>
    <div class="nav-item" id="nav-weekly" onclick="show('weekly')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
      先週の変更
    </div>
    <div class="nav-item" id="nav-approvals" onclick="show('approvals')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v4M8 10v4M2 8h4M10 8h4"/></svg>
      上司への確認事項
      <span class="nav-badge zero" id="approval-count">0</span>
    </div>
    <div class="nav-item" id="nav-revenue" onclick="show('revenue')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12l3-4 3 2 3-5 3 3"/></svg>
      収益シミュレーション
    </div>
    <div class="nav-item" id="nav-competitors" onclick="show('competitors')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="8" r="3"/><circle cx="11" cy="8" r="3"/></svg>
      競合分析
    </div>
    <div class="nav-item" id="nav-requests" onclick="show('requests')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12v10H2z"/><path d="M5 6h6M5 9h4"/></svg>
      中川さん業務依頼
    </div>
    <div class="nav-item" id="nav-gantt" onclick="show('gantt')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h5M2 8h9M2 12h6"/><rect x="7" y="3" width="5" height="2" rx="1"/><rect x="11" y="7" width="3" height="2" rx="1"/><rect x="8" y="11" width="4" height="2" rx="1"/></svg>
      4月ガント
    </div>
    <div class="nav-item" id="nav-updates" onclick="show('updates')">
      <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2L9 7M4 9l-2 5 5-2"/><path d="M9 7l-5 2"/></svg>
      更新ログ
    </div>
  </div>

  <div class="sb-section" style="margin-top:auto">
    <div class="sb-stats">
      <div class="sb-stat-label">全体進捗</div>
      <div class="sb-stat-val" id="sb-pct">—</div>
      <div class="sb-prog"><div class="sb-prog-fill" id="sb-prog-fill" style="width:0%"></div></div>
      <div style="font-size:11px;color:var(--text3);margin-top:6px" id="sb-stat-detail"></div>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main" id="main"></div>
</div>

<!-- ===== TASK MODAL ===== -->
<div class="modal-bg" id="task-modal">
<div class="modal">
  <div class="modal-title" id="tm-title">タスクを追加</div>
  <input type="hidden" id="tm-id">
  <div class="field-row">
    <div class="field"><label>フェーズ</label><select id="tm-phase"></select></div>
    <div class="field"><label>ステータス</label>
      <select id="tm-status">
        <option>完了</option><option>対応中</option><option>未着手</option>
        <option>保留</option><option>緊急</option><option>承認待ち</option>
      </select>
    </div>
  </div>
  <div class="field"><label>タスク名</label><input type="text" id="tm-name" placeholder="タスク名を入力"></div>
  <div class="field"><label>詳細</label><textarea id="tm-detail" placeholder="詳細内容..."></textarea></div>
  <div class="field"><label>備考・メモ</label><textarea id="tm-note" placeholder="備考・進捗メモ・リンクなど..."></textarea></div>
  <div class="field-row">
    <div class="field"><label>担当者</label><input type="text" id="tm-owner" placeholder="例：中川、櫻井"></div>
    <div class="field"><label>優先度</label>
      <select id="tm-priority"><option>高</option><option selected>中</option><option>低</option></select>
    </div>
  </div>
  <div class="field"><label>期限</label><input type="date" id="tm-due"></div>

function save(){
  localStorage.setItem('td3_tasks', JSON.stringify(tasks));
  localStorage.setItem('td3_updates', JSON.stringify(updates));
  localStorage.setItem('td3_weekly', JSON.stringify(weeklyChanges));
  localStorage.setItem('td3_approvals', JSON.stringify(approvals));
  updateSidebar();

function updateSidebar(){
  const total=tasks.length, done=tasks.filter(t=>t.status==='完了').length;
  const wip=tasks.filter(t=>t.status==='対応中').length;
  const pct=total?Math.round(done/total*100):0;
  const el1=document.getElementById('sb-pct');
  const el2=document.getElementById('sb-prog-fill');
  const el3=document.getElementById('sb-stat-detail');
  if(el1)el1.textContent=pct+'%';
  if(el2)el2.style.width=pct+'%';
  if(el3)el3.textContent=`完了 ${done}  対応中 ${wip}  全 ${total}`;
  const pending=approvals.filter(a=>a.status==='未回答').length;
  const badge=document.getElementById('approval-count');
  if(badge){
    badge.textContent=pending;
    badge.className='nav-badge'+(pending===0?' zero':'');
  }
}

function show(v){
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('nav-'+v);
  if(el)el.classList.add('active');
  const fns={overview:renderOverview,tasks:renderTasks,weekly:renderWeekly,approvals:renderApprovals,revenue:renderRevenue,competitors:renderCompetitors,requests:renderRequests,gantt:renderGantt,updates:renderUpdates};
  if(fns[v])fns[v]();
  updateSidebar();
}

function renderTasks(){
  const phases=filterPhase?[filterPhase]:PHASES;
  let html=`
    <div class="page-header">
      <div>
        <div class="page-eyebrow">進捗管理</div>
        <div class="page-title">${filterPhase?filterPhase:'全タスクリスト'}</div>

      </div>
      <div class="hdr-actions">
        ${filterPhase?`<button class="btn ghost sm" onclick="filterPhase=null;renderTasks()">× 解除</button>`:''}
        <select class="btn" onchange="filterStatus=this.value||null;renderTasks()" style="padding:8px 12px">
          <option value="">全ステータス</option>
          ${['完了','対応中','未着手','保留','緊急','承認待ち'].map(s=>`<option ${filterStatus===s?'selected':''}>${s}</option>`).join('')}
        </select>
        <button class="btn primary" onclick="openTaskModal(null)">+ タスク追加</button>
      </div>
    </div>`;

  phases.forEach(phase=>{
    let pts=tasks.filter(t=>t.phase===phase);
    if(filterStatus)pts=pts.filter(t=>t.status===filterStatus);
    if(!pts.length)return;
    const done=pts.filter(t=>t.status==='完了').length;
    const pct=Math.round(done/pts.length*100);
    html+=`<div style="margin-bottom:2rem">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem">
        <div style="width:10px;height:10px;border-radius:50%;background:${PHASE_COLOR[phase]||'#aaa'};flex-shrink:0"></div>
        <div style="font-size:15px;font-weight:600">${phase}</div>
        <div style="flex:1;max-width:200px"><div class="prog"><div class="prog-fill" style="width:${pct}%;background:${PHASE_COLOR[phase]||'var(--accent)'}"></div></div></div>
        <div style="font-size:12px;color:var(--text3)">${done}/${pts.length}</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm)">
        <table class="tbl hoverable">
          <thead><tr>
            <th style="width:34%">タスク</th><th style="width:10%">ステータス</th>
            <th style="width:8%">担当</th><th style="width:8%">期限</th>
            <th style="width:6%">優先</th><th>備考</th>
          </tr></thead><tbody>
          ${pts.map(t=>`<tr onclick="openTaskModal(${t.id})">
            <td>
              <div class="task-name-cell ${t.status==='完了'?'done':''}">${t.name}</div>
              ${t.detail?`<div class="task-detail-cell">${t.detail.substring(0,55)}${t.detail.length>55?'…':''}</div>`:''}
            </td>
            <td><span class="badge ${SMAP[t.status]||'s-todo'}">${t.status}</span></td>
            <td style="font-size:12px;color:var(--text2)">${t.owner||'—'}</td>
            <td style="font-size:12px;color:var(--text2)">${t.due||'—'}</td>
            <td style="font-size:12px;font-weight:600;color:${t.priority==='高'?'var(--red)':t.priority==='中'?'var(--amber)':'var(--text3)'}">${t.priority}</td>
            <td style="font-size:11px;color:var(--text2);line-height:1.5">${(t.note||'').substring(0,55)}${(t.note||'').length>55?'…':''}</td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  });
  document.getElementById('main').innerHTML=html;
}

function resolveApproval(id,status){
  const note=prompt(`${status}のメモ（任意）:`,'');
  const a=approvals.find(x=>x.id===id);
  if(a){a.status=status;a.resolvedNote=note||'';}
  save();renderApprovals();
}

// ============================================================
// TASK MODAL
// ============================================================
function openTaskModal(id){
  document.getElementById('tm-phase').innerHTML=PHASES.map(p=>`<option value="${p}">${p}</option>`).join('');
  if(id){
    const t=tasks.find(x=>x.id===id);
    document.getElementById('tm-title').textContent='タスクを編集';
    document.getElementById('tm-id').value=id;
    document.getElementById('tm-phase').value=t.phase;
    document.getElementById('tm-status').value=t.status;
    document.getElementById('tm-name').value=t.name;
    document.getElementById('tm-detail').value=t.detail||'';
    document.getElementById('tm-note').value=t.note||'';
    document.getElementById('tm-owner').value=t.owner||'';
    document.getElementById('tm-priority').value=t.priority||'中';
    document.getElementById('tm-due').value=t.due||'';
    document.getElementById('tm-del').style.display='inline-flex';
  }else{
    document.getElementById('tm-title').textContent='タスクを追加';
    document.getElementById('tm-id').value='';
    ['tm-name','tm-detail','tm-note','tm-owner','tm-due'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('tm-status').value='未着手';
    document.getElementById('tm-priority').value='中';
    document.getElementById('tm-del').style.display='none';
  }
  document.getElementById('task-modal').classList.add('open');
}
function closeTaskModal(){document.getElementById('task-modal').classList.remove('open')}
function saveTask(){
  const id=parseInt(document.getElementById('tm-id').value)||null;
  const t={id:id||nextId++,phase:document.getElementById('tm-phase').value,status:document.getElementById('tm-status').value,name:document.getElementById('tm-name').value.trim(),detail:document.getElementById('tm-detail').value,note:document.getElementById('tm-note').value,owner:document.getElementById('tm-owner').value,priority:document.getElementById('tm-priority').value,due:document.getElementById('tm-due').value};
  if(!t.name)return alert('タスク名を入力してください');
  if(id){const i=tasks.findIndex(x=>x.id===id);tasks[i]=t;}else tasks.push(t);
  save();closeTaskModal();show(currentView);
}
function deleteTask(){if(!confirm('削除しますか？'))return;tasks=tasks.filter(t=>t.id!==parseInt(document.getElementById('tm-id').value));save();closeTaskModal();show(currentView);}

// ============================================================
// UPDATE MODAL
// ============================================================
function openUpdModal(){
  document.getElementById('um-phase').innerHTML=['全体',...PHASES].map(p=>`<option>${p}</option>`).join('');
  document.getElementById('um-text').value='';
  document.getElementById('upd-modal').classList.add('open');
}
function saveUpdate(){
  const text=document.getElementById('um-text').value.trim();
  if(!text)return alert('内容を入力してください');
  const now=new Date();
  const date=`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const ph=document.getElementById('um-phase').value;
  updates.push({date,tag:document.getElementById('um-tag').value,phase:ph==='全体'?'':ph,text});
  save();document.getElementById('upd-modal').classList.remove('open');
  if(currentView==='updates')renderUpdates();else show(currentView);
}
function delUpdate(i){if(!confirm('削除しますか？'))return;updates.splice(i,1);save();renderUpdates();}
